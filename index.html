<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jester</title>
    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="icon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #ffffff;
            --muted: #6a6a6a;
            --accent: #e0e0e0;
            --card: rgba(20, 20, 20, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --glow: rgba(255, 255, 255, 0.15);
            --shine-base: #404040;
            --shine-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; 
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* custom cursor */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--fg);
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease, background-color 0.15s ease;
            mix-blend-mode: difference;
        }

        .cursor-dot.hover {
            transform: translate(-50%, -50%) scale(2.5);
            background-color: #fff;
        }

        .cursor-dot.click {
            transform: translate(-50%, -50%) scale(0.5);
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .emission {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(0.5px);
        }

        #snowfall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(255, 255, 255, 0.05),
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 255, 255, 0.01) 2px,
                rgba(255, 255, 255, 0.01) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            position: relative;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid var(--border);
            position: relative;
            animation: avatarPulse 4s ease-in-out infinite;
            cursor: none; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.2); }
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: ringRotate 8s linear infinite;
            pointer-events: none;
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .shiny-text {
            position: relative;
            display: inline-block;
            background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 40%, var(--fg) 60%, var(--fg) 100%);
            background-size: 200% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-position: 100% center;
        }

        .shiny-text::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 35%, var(--shine-color) 50%, var(--fg) 65%, var(--fg) 100%);
            background-size: 300% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-position: 120% center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .shiny-text:hover::before {
            opacity: 1;
            animation: shineEffect 1.5s ease-in-out;
        }

        @keyframes shineEffect {
            0% { background-position: 120% center; }
            100% { background-position: -120% center; }
        }

        .display-name {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 4px;
            position: relative;
        }

        .display-name .shiny-text::before {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
        }

        .username {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            cursor: none; 
            transition: color 0.3s ease;
            position: relative;
            display: inline-block;
        }
        
        .username:hover { color: var(--fg); }
        .username .shiny-text { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .username .shiny-text::before { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 35%, var(--fg) 50%, var(--muted) 65%, var(--muted) 100%); background-size: 300% 100%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .username:hover .shiny-text { background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 100%); background-clip: text; -webkit-background-clip: text; }

        .copied-feedback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            font-size: 12px;
            color: var(--fg);
            letter-spacing: 2px;
            z-index: 5;
        }

        .copied-feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 20px 0;
            animation: dividerGlow 3s ease-in-out infinite;
        }

        @keyframes dividerGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .info-section {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .info-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }

        .info-item:hover::before { left: 100%; }
        .info-item:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; }
        .info-value { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 600; }
        .info-value .shiny-text::before { background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 35%, #ffffff 50%, var(--fg) 65%, var(--fg) 100%); background-size: 300% 100%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); }

        .tags { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

        .tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .tag .shiny-text { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tag .shiny-text::before { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 35%, var(--fg) 50%, var(--muted) 65%, var(--muted) 100%); background-size: 300% 100%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tag:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
        .tag:hover .shiny-text { background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 100%); background-clip: text; -webkit-background-clip: text; }

        .social-links { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

        .social-link {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-link svg { width: 20px; height: 20px; fill: var(--muted); transition: all 0.3s ease; }
        .social-link::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.5s ease; }
        .social-link:hover::before { left: 100%; }
        .social-link:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); }
        .social-link:hover svg { fill: var(--fg); filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5)); }

        /* custom audio player */
        .audio-player {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .audio-player:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--fg);
            margin-left: 2px;
        }

        .play-btn.playing svg {
            margin-left: 0;
        }

        .track-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .track-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 10px;
            color: var(--muted);
        }

        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: none;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--fg);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .volume-icon {
            cursor: none;
        }

        .volume-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--muted);
            transition: fill 0.3s ease;
        }

        .volume-slider {
            width: 60px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            cursor: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: var(--fg);
            border-radius: 50%;
            cursor: none;
            transition: transform 0.2s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .show-card-btn {
            width: 100%;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .show-card-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.5s ease; }
        .show-card-btn:hover::before { left: 100%; }
        .show-card-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.3); color: var(--fg); box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        .show-card-btn .shiny-text { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .show-card-btn .shiny-text::before { background: linear-gradient(90deg, var(--muted) 0%, var(--muted) 35%, var(--fg) 50%, var(--muted) 65%, var(--muted) 100%); background-size: 300% 100%; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .show-card-btn:hover .shiny-text { background: linear-gradient(90deg, var(--fg) 0%, var(--fg) 100%); background-clip: text; -webkit-background-clip: text; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            padding: 20px;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .profile-card {
            width: 340px;
            background: linear-gradient(145deg, rgba(60, 60, 60, 0.3) 0%, rgba(40, 40, 40, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .profile-card { transform: scale(1) translateY(0); }

        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(200, 200, 200, 0.15) 0%, transparent 50%);
            animation: behindGlow 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes behindGlow { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        .profile-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.5;
        }

        .profile-card-content { position: relative; z-index: 2; }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a3a3a 0%, #252525 100%);
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: none; }
        .profile-name { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700; text-align: center; color: var(--fg); margin-bottom: 4px; letter-spacing: 1px; }
        .profile-title { font-size: 12px; text-align: center; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
        .profile-handle { font-size: 13px; text-align: center; color: var(--muted); margin-bottom: 16px; }
        .profile-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .profile-status-dot { width: 8px; height: 8px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); animation: statusPulse 2s ease-in-out infinite; }
        @keyframes statusPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.9); } }
        .profile-status-text { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .profile-info-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 12px; text-align: center; }
        .profile-info-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .profile-info-value { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 600; }
        .contact-btn { width: 100%; padding: 12px 24px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: var(--fg); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; cursor: none; transition: all 0.3s ease; letter-spacing: 1px; }
        .contact-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .close-modal svg { width: 14px; height: 14px; stroke: var(--muted); transition: stroke 0.3s ease; }
        .close-modal:hover { background: rgba(255, 255, 255, 0.1); transform: rotate(90deg); }
        .close-modal:hover svg { stroke: var(--fg); }

        @keyframes particleFloat { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }

        .status-dot { width: 8px; height: 8px; background: #ffffff; border-radius: 50%; animation: statusBlink 2s ease-in-out infinite; box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }

        @media (max-width: 480px) {

            .track-info { order: 1; width: 100%; }
            .play-btn { order: 2; }
            .volume-control { order: 3; width: 100%; justify-content: center; }
        }
    </style>

    <script>
        // config
        const CONFIG = {
            displayName: "JESTER",
            username: "@jestercat808",
            age: "19",
            location: "Denmark",
            title: "Developer & Gamer",
            avatar: "pfp1.png",
            audioSrc: "Hell-Kitty.mp3",
            trackName: "HellKitty",
            trackArtist: "C4MM",
            links: {
                discord: "discord://-/users/1393676537160667199",
                reddit: "https://www.reddit.com/user/Sufficient-Employ498/",
                x: "https://x.com/void64353544059",
                github: "https://github.com/DragonCatNBD",
                steam: "https://steamcommunity.com/profiles/76561198262922451/",
                roblox: "https://www.roblox.com/users/7421851388/profile"
            }
        };

        // cursor
        const cursorDot = document.getElementById('cursorDot');

        document.addEventListener('mousemove', (e) => {
            cursorDot.style.left = `${e.clientX}px`;
            cursorDot.style.top = `${e.clientY}px`;
        });

        const hoverElements = document.querySelectorAll('a, button, .info-item, .tag, .avatar, .username, .social-link, .play-btn, .volume-slider, .progress-container');
        hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursorDot.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover'));
        });

        document.addEventListener('mousedown', () => cursorDot.classList.add('click'));
        document.addEventListener('mouseup', () => cursorDot.classList.remove('click'));

        // audio
        let audioContext = null;
        const audioElement = document.getElementById('audioElement');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIcon = document.getElementById('volumeIcon');
        const trackNameEl = document.getElementById('trackName');
        const trackArtistEl = document.getElementById('trackArtist');

        let hasInteracted = false;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function setupAudio() {
            if(CONFIG.audioSrc) {
                audioElement.src = CONFIG.audioSrc;
                trackNameEl.textContent = CONFIG.trackName;
                trackArtistEl.textContent = CONFIG.trackArtist;
                audioElement.volume = volumeSlider.value;
            } else {
                trackNameEl.textContent = "No Track";
                trackArtistEl.textContent = "Configure MP3";
            }
        }

        function togglePlay() {
            if(!CONFIG.audioSrc) return;
            
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (audioElement.paused) {
                audioElement.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playBtn.classList.add('playing');
            } else {
                audioElement.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playBtn.classList.remove('playing');
            }
        }

        playBtn.addEventListener('click', () => {
            initAudioContext();
            playClickSound();
            togglePlay();
        });

        audioElement.addEventListener('timeupdate', () => {
            if(audioElement.duration) {
                const progress = (audioElement.currentTime / audioElement.duration) * 100;
                progressBar.style.width = `${progress}%`;
            }
        });

        audioElement.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            playBtn.classList.remove('playing');
            progressBar.style.width = '0%';
        });

        progressContainer.addEventListener('click', (e) => {
            if(!CONFIG.audioSrc || !audioElement.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = percent * audioElement.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            audioElement.volume = e.target.value;
            if(e.target.value == 0) {
                volumeIcon.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
            } else {
                 volumeIcon.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
            }
        });

        // click anywhere to start
        function attemptAutoplay() {
            if (!hasInteracted && CONFIG.audioSrc) {
                hasInteracted = true;
                initAudioContext();
                togglePlay();
                document.removeEventListener('click', attemptAutoplay);
            }
        }
        document.addEventListener('click', attemptAutoplay);

        // sounds
        function playHoverSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(280, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(220, audioContext.currentTime + 0.08);
            gainNode.gain.setValueAtTime(0.015, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.08);
        }

        function playClickSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(180, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.12);
            gainNode.gain.setValueAtTime(0.025, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.12);
        }

        function playModalSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(350, audioContext.currentTime + 0.1);
            oscillator.frequency.exponentialRampToValueAtTime(280, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.03, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // dom injection
        function applyConfig() {
            const dn = document.getElementById("displayNameText");
            const un = document.getElementById("usernameText");
            const age = document.getElementById("ageText");
            const loc = document.getElementById("locationText");

            dn.textContent = CONFIG.displayName;
            dn.setAttribute("data-text", CONFIG.displayName);
            un.textContent = CONFIG.username;
            un.setAttribute("data-text", CONFIG.username);
            age.textContent = CONFIG.age;
            age.setAttribute("data-text", CONFIG.age);
            loc.textContent = CONFIG.location;
            loc.setAttribute("data-text", CONFIG.location);

            document.getElementById("modalName").textContent = CONFIG.displayName.toLowerCase();
            document.getElementById("modalTitle").textContent = CONFIG.title;
            document.getElementById("modalHandle").textContent = CONFIG.username;
            document.getElementById("modalAge").textContent = CONFIG.age;
            document.getElementById("modalLocation").textContent = CONFIG.location;

            document.getElementById("linkDiscord").href = CONFIG.links.discord;
            document.getElementById("linkReddit").href = CONFIG.links.reddit;
            document.getElementById("linkX").href = CONFIG.links.x;
            document.getElementById("linkGithub").href = CONFIG.links.github;
            document.getElementById("linkSteam").href = CONFIG.links.steam;
            document.getElementById("linkRoblox").href = CONFIG.links.roblox;
            
            setupAudio();
        }

        // interactions
        document.addEventListener('click', function initAudioOnClick() {
            initAudioContext();
            document.removeEventListener('click', initAudioOnClick);
        }, { once: true });

        document.addEventListener('mouseenter', function initAudioOnHover() {
            initAudioContext();
            document.removeEventListener('mouseenter', initAudioOnHover);
        }, { once: true });

        const interactiveElements = document.querySelectorAll('.info-item, .tag, .avatar, .social-link, .show-card-btn, .close-modal, .contact-btn, .play-btn');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => playHoverSound());
            el.addEventListener('click', () => playClickSound());
        });

        // particles
        const bgParticles = document.getElementById('bgParticles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            bgParticles.appendChild(particle);
        }

        // snow
        const canvas = document.getElementById('snowfall');
        const ctx = canvas.getContext('2d');
        let snowflakes = [];
        const SNOWFLAKE_COUNT = 80;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function createSnowflake() { return { x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, radius: Math.max(0.5, Math.random() * 3 + 1), speed: Math.random() * 0.5 + 0.3, wind: Math.random() * 0.3 - 0.15, opacity: Math.random() * 0.5 + 0.3, wobble: Math.random() * Math.PI * 2, wobbleSpeed: Math.random() * 0.02 + 0.01 }; }
        function initSnowflakes() { snowflakes = []; for (let i = 0; i < SNOWFLAKE_COUNT; i++) { const flake = createSnowflake(); flake.y = Math.random() * canvas.height; snowflakes.push(flake); } }
        function drawSnowflake(flake) { ctx.beginPath(); ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`; ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255, 255, 255, 0.5)'; ctx.fill(); ctx.shadowBlur = 0; }
        function updateSnowflake(flake) { flake.wobble += flake.wobbleSpeed; flake.y += flake.speed; flake.x += flake.wind + Math.sin(flake.wobble) * 0.3; if (flake.y > canvas.height + 10) { flake.y = -10; flake.x = Math.random() * canvas.width; } if (flake.x > canvas.width + 10) { flake.x = -10; } if (flake.x < -10) { flake.x = canvas.width + 10; } }
        function animateSnow() { ctx.clearRect(0, 0, canvas.width, canvas.height); snowflakes.forEach(flake => { updateSnowflake(flake); drawSnowflake(flake); }); requestAnimationFrame(animateSnow); }
        resizeCanvas(); initSnowflakes(); animateSnow();
        window.addEventListener('resize', () => resizeCanvas());

        // username copy fix
        const usernameContainer = document.getElementById('usernameContainer');
        const copiedFeedback = document.getElementById('copiedFeedback');
        
        usernameContainer.addEventListener('click', function(e) {
            e.preventDefault(); 
            navigator.clipboard.writeText(CONFIG.username).then(() => {
                copiedFeedback.classList.add('show');
                setTimeout(() => {
                    copiedFeedback.classList.remove('show');
                }, 1000);
            });
        });

        // card tilt
        const card = document.getElementById('card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 25;
            const rotateY = (centerX - x) / 25;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => { card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)'; });

        // modal
        const modalOverlay = document.getElementById('modalOverlay');
        const showCardBtn = document.getElementById('showCardBtn');
        const closeModal = document.getElementById('closeModal');
        const profileCard = document.getElementById('profileCard');

        showCardBtn.addEventListener('click', () => { playModalSound(); modalOverlay.classList.add('active'); document.body.classList.add('modal-open'); });
        closeModal.addEventListener('click', () => { modalOverlay.classList.remove('active'); document.body.classList.remove('modal-open'); });
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) { modalOverlay.classList.remove('active'); document.body.classList.remove('modal-open'); } });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) { modalOverlay.classList.remove('active'); document.body.classList.remove('modal-open'); } });

        // profile card tilt
        profileCard.addEventListener('mousemove', (e) => {
            const rect = profileCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 30;
            const rotateY = (centerX - x) / 30;
            profileCard.style.transform = `scale(1) translateY(0) perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        profileCard.addEventListener('mouseleave', () => { profileCard.style.transform = 'scale(1) translateY(0)'; });

        document.getElementById('contactBtn').addEventListener('click', () => console.log('Contact clicked'));

        // initialize
        applyConfig();
    </script>
</body>
</html>
